<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>Tom's AI Career Assistant</title>
<meta name="description" content="Ask Tom's AI assistant about his experience, background, and AI projects." />
<style>
  /* ------------------------------------------------------------------
     Theme tokens — auto-follows the device's dark/light mode.
     LinkedIn-inspired palette per spec: #0A66C2 accent, #1D2226 dark.
  ------------------------------------------------------------------ */
  :root {
    --accent: #0A66C2;
    --accent-pressed: #084d94;
    --bg: #f3f2ef;
    --surface: #ffffff;
    --bubble-ai: #eef0f2;
    --text: #1d2226;
    --text-muted: #6e767d;
    --border: #dfe2e6;
    --glow: rgba(10, 102, 194, 0.35);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14181b;
      --surface: #1d2226;
      --bubble-ai: #2b3237;
      --text: #f2f4f6;
      --text-muted: #9aa4ad;
      --border: #3a4248;
      --glow: rgba(112, 181, 249, 0.4);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }

  /* App shell — mobile-first; on desktop it reads as a centered popup card. */
  .app {
    position: relative; /* anchors the slide-out menu, backdrop, and modal */
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    background: var(--surface);
    overflow: hidden; /* keeps the off-screen menu from creating scroll */
  }
  @media (min-width: 560px) {
    body { align-items: center; padding: 24px 0; }
    .app {
      height: min(780px, calc(100dvh - 48px));
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.14);
      overflow: hidden;
    }
  }

  /* ---------------- Top bar ---------------- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .btn-ghost {
    color: var(--text);
    background: transparent;
    border: none;
    padding: 8px 10px;
  }
  .btn-ghost:active {
    color: var(--accent-pressed);
    box-shadow: 0 0 0 3px var(--glow);
    background: var(--bubble-ai);
  }

  .btn-outline {
    color: var(--accent);
    background: transparent;
    border: 1.5px solid var(--accent);
    padding: 8px 14px;
  }
  .btn-outline:active {
    color: #fff;
    background: var(--accent-pressed);
    box-shadow: 0 0 0 3px var(--glow);
  }

  .icon { width: 16px; height: 16px; flex-shrink: 0; }

  /* ---------------- Disclaimer ---------------- */
  .disclaimer {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 10px 20px 4px;
    flex-shrink: 0;
  }

  /* ---------------- Chat area ---------------- */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }
  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.ai {
    align-self: flex-start;
    background: var(--bubble-ai);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble.typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
  }
  .typing-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typing-bounce 1.2s infinite ease-in-out;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ---------------- Timestamps ---------------- */
  .timestamp {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    padding: 0 4px;
  }
  .bubble-row { display: flex; flex-direction: column; max-width: 82%; }
  .bubble-row.user { align-self: flex-end; align-items: flex-end; }
  .bubble-row.ai { align-self: flex-start; align-items: flex-start; }
  .bubble-row .bubble { max-width: 100%; }

  /* ---------------- Starter chips ---------------- */
  .chips {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    padding: 4px 16px 10px;
    flex-shrink: 0;
  }
  .chip {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    background: transparent;
    border: 1.5px solid var(--accent);
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:active {
    color: #fff;
    background: var(--accent-pressed);
    box-shadow: 0 0 0 3px var(--glow);
  }
  .chip:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------------- Hamburger toggle ---------------- */
  .hamburger {
    position: relative;
    z-index: 40; /* stays above the menu panel so the X remains tappable */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 999px;
    background: transparent;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease, box-shadow 0.15s ease;
  }
  .hamburger:active {
    background: var(--bubble-ai);
    box-shadow: 0 0 0 3px var(--glow);
  }
  .hamburger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .hamburger .bar {
    width: 20px;
    height: 2px;
    border-radius: 2px;
    background: var(--text);
    transition: transform 0.25s ease, opacity 0.2s ease;
  }
  /* Morph to X: outer bars rotate into place, middle bar fades out */
  .hamburger.open .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open .bar:nth-child(2) { opacity: 0; }
  .hamburger.open .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* ---------------- Slide-out menu ---------------- */
  .menu-backdrop {
    position: absolute;
    inset: 0;
    z-index: 20;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .menu-backdrop.open { opacity: 1; pointer-events: auto; }

  .menu {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 30;
    width: 72%;
    max-width: 300px;
    display: flex;
    flex-direction: column;
    align-items: flex-start; /* items shrink-wrap and stack from the left */
    gap: 10px;
    padding: 68px 12px 12px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.28s ease;
  }
  .menu.open { transform: translateX(0); }

  .menu-item {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    text-align: left;
    color: var(--text);
    background: transparent;
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    align-items: center;
    gap: 14px;
    /* No width set: items shrink-wrap icon + label so the pressed
       pill hugs the content, matching the Back to LinkedIn button. */
  }
  /* Pressed state mirrors the Back to LinkedIn button */
  .menu-item:active {
    color: var(--accent-pressed);
    background: var(--bubble-ai);
    box-shadow: 0 0 0 3px var(--glow);
  }
  .menu-item:active .menu-icon { color: var(--accent-pressed); }
  .menu-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .menu-icon {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--text-muted);
  }

  .menu-divider {
    align-self: stretch; /* spans panel width even though items shrink-wrap */
    height: 1px;
    background: var(--border);
    margin: 4px 14px;
  }

  /* ---------------- Confirmation modal ---------------- */
  .modal-backdrop {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }

  .modal {
    position: relative;
    width: 100%;
    max-width: 320px;
    padding: 20px 18px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .modal-close:active { background: var(--bubble-ai); color: var(--text); }
  .modal-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .modal-text {
    font-size: 13px;
    line-height: 1.4;
    text-align: center;
    margin: 8px 0 16px; /* top margin clears the X button */
    white-space: nowrap;
  }
  @media (max-width: 379px) {
    .modal-text { font-size: 12px; } /* keeps the longer reset message on one line */
  }
  .modal-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  /* Destructive confirm button (Reset) — red filled to signal seriousness */
  .btn-danger {
    color: #fff;
    background: #d11a2a;
    border: 1.5px solid #d11a2a;
    padding: 8px 18px;
  }
  .btn-danger:active {
    background: #a3121f;
    border-color: #a3121f;
    box-shadow: 0 0 0 3px rgba(209, 26, 42, 0.35);
  }

  /* Slow the slide animation slightly on 60Hz mobile screens */
  @media (max-width: 559px) {
    .menu { transition: transform 0.35s ease; }
    .menu-backdrop { transition: opacity 0.35s ease; }
    .hamburger .bar { transition: transform 0.3s ease, opacity 0.25s ease; }
  }

  /* ---------------- Input row ---------------- */
  .inputrow {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px calc(12px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .inputrow input {
    flex: 1;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .inputrow input::placeholder { color: var(--text-muted); }
  .inputrow input:focus { border-color: var(--accent); }

  .send {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .send:active { background: var(--accent-pressed); box-shadow: 0 0 0 3px var(--glow); }
  .send:disabled { opacity: 0.5; cursor: default; }
  .send:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .send .icon { width: 18px; height: 18px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
    .chat { scroll-behavior: auto; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <a class="btn btn-ghost" id="backLink" href="#" rel="noopener">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to LinkedIn
    </a>
    <button class="hamburger" id="menuToggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </header>

  <!-- Menu backdrop (tap to close) -->
  <div class="menu-backdrop" id="menuBackdrop"></div>

  <!-- Slide-out menu -->
  <nav class="menu" id="menu" aria-hidden="true">
    <button class="menu-item" id="menuResume" type="button">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Resume
    </button>
    <button class="menu-item" id="menuLinkedIn" type="button">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      Connect on LinkedIn
    </button>
    <button class="menu-item" id="menuGitHub" type="button">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      See My GitHub
    </button>
    <div class="menu-divider"></div>
    <button class="menu-item" id="menuExport" type="button">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/></svg>
      Save Chat
    </button>
    <button class="menu-item" id="menuReset" type="button">
      <svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      Reset Chat
    </button>
  </nav>

  <!-- Confirmation modal (Reset Chat + leave prompt) -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalText">
      <button class="modal-close" id="modalClose" type="button" aria-label="Dismiss">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <p class="modal-text" id="modalText"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel" type="button"></button>
        <button class="btn btn-outline" id="modalConfirm" type="button"></button>
      </div>
    </div>
  </div>

  <!-- Disclaimer -->
  <p class="disclaimer">I'm an AI chat Tom built to share his work and projects.<br>Chats aren't linked to your LinkedIn or saved after you leave.</p>

  <!-- Chat -->
  <main class="chat" id="chat" aria-live="polite"></main>

  <!-- Starter chips -->
  <div class="chips" id="chips">
    <button class="chip" type="button" data-q="Tell me about Tom's experience.">Ask me about my experience</button>
    <button class="chip" type="button" data-q="Tell me about Tom's AI project.">Ask me about my AI project</button>
  </div>

  <!-- Input -->
  <div class="inputrow">
    <input id="input" type="text" placeholder="Type a message..." maxlength="1000" autocomplete="off" aria-label="Your message" />
    <button class="send" id="send" type="button" aria-label="Send message">
      <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>

<script>
  // ================= CONFIG — update these two before deploying ============
  const WORKER_URL  = "/api/chat";                                    // Same-domain Vercel API route — leave as is
  const LINKEDIN_URL = "https://www.linkedin.com/in/thomasmgreene06/";   // Back-to-LinkedIn target
  const RESUME_URL   = "./resume.pdf";                                // Resume PDF path or URL
  const GITHUB_URL   = "https://github.com/TommyBoy222/ask-tom";      // See My GitHub target
  // ==========================================================================

  const chatEl  = document.getElementById("chat");
  const inputEl = document.getElementById("input");
  const sendEl  = document.getElementById("send");
  const chipsEl = document.getElementById("chips");

  const backLink      = document.getElementById("backLink");
  const menuToggle    = document.getElementById("menuToggle");
  const menuEl        = document.getElementById("menu");
  const menuBackdrop  = document.getElementById("menuBackdrop");
  const modalBackdrop = document.getElementById("modalBackdrop");
  const modalText     = document.getElementById("modalText");
  const modalConfirm  = document.getElementById("modalConfirm");
  const modalClose     = document.getElementById("modalClose");
  const modalCancel   = document.getElementById("modalCancel");

  backLink.href = LINKEDIN_URL;

  // Conversation history sent to the Worker (Worker also caps at 10 turns).
  const history = [];
  let busy = false;
  let hasExported = false; // tracks whether this session's chat was downloaded

  const GREETING =
    "Hello! I'm Tom's AI assistant. I can tell you about his experience, background, and the AI projects he's built. What would you like to know?";

  addBubble("ai", GREETING);

  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }

  function addBubble(role, text, opts = {}) {
    const row = document.createElement("div");
    row.className = "bubble-row " + (role === "user" ? "user" : "ai");

    const el = document.createElement("div");
    el.className = "bubble " + (role === "user" ? "user" : "ai") + (opts.typing ? " typing" : "");

    if (opts.typing) {
      el.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    } else {
      el.textContent = text;
    }
    row.appendChild(el);

    // Typing indicator gets no timestamp — only real messages do.
    if (!opts.typing) {
      const ts = document.createElement("span");
      ts.className = "timestamp";
      ts.textContent = formatTime(new Date());
      row.appendChild(ts);
    }

    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return { row, bubble: el };
  }

  function resolveTyping(typing, text) {
    typing.bubble.classList.remove("typing");
    typing.bubble.innerHTML = "";
    typing.bubble.textContent = text;

    const ts = document.createElement("span");
    ts.className = "timestamp";
    ts.textContent = formatTime(new Date());
    typing.row.appendChild(ts);
  }

  async function send(text) {
    const message = (text ?? inputEl.value).trim();
    if (!message || busy) return;

    busy = true;
    sendEl.disabled = true;
    inputEl.value = "";
    chipsEl.style.display = "none"; // hide starter chips after first message

    addBubble("user", message);
    history.push({ role: "user", content: message });

    const typing = addBubble("ai", "", { typing: true });

    try {
      const res = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      const reply = data.reply ||
        "Thanks to high demand, this assistant has reached its capacity site-wide for now. Please check back soon, or feel free to reach out to Tom directly in the meantime.";

      // Debug aid (visitors never see this — console only): makes it easy to
      // tell a real Anthropic API failure apart from normal rate limiting.
      if (data.unavailable) {
        console.warn("[debug] Genuine API failure — check Vercel Logs for the Anthropic error detail.");
      } else if (data.rateLimited) {
        console.info("[debug] Rate-limit response (expected behavior, not an error).");
      }

      resolveTyping(typing, reply);

      // Rate-limit warnings & outage notices don't belong in model context.
      if (!data.rateLimited && !data.unavailable) {
        history.push({ role: "assistant", content: reply });
      } else {
        history.pop(); // drop the blocked user message from history too
      }
    } catch {
      resolveTyping(typing,
        "Thanks to high demand, this assistant has reached its capacity site-wide for now. Please check back soon, or feel free to reach out to Tom directly in the meantime.");
      history.pop();
    } finally {
      busy = false;
      sendEl.disabled = false;
      chatEl.scrollTop = chatEl.scrollHeight;
      inputEl.focus();
    }
  }

  sendEl.addEventListener("click", () => send());
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  chipsEl.addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (chip) send(chip.dataset.q);
  });

  // ================= Slide-out menu =================
  function setMenu(open) {
    menuEl.classList.toggle("open", open);
    menuBackdrop.classList.toggle("open", open);
    menuToggle.classList.toggle("open", open);
    menuToggle.setAttribute("aria-expanded", String(open));
    menuToggle.setAttribute("aria-label", open ? "Close menu" : "Open menu");
    menuEl.setAttribute("aria-hidden", String(!open));
  }

  menuToggle.addEventListener("click", () => {
    setMenu(!menuEl.classList.contains("open"));
  });
  menuBackdrop.addEventListener("click", () => setMenu(false));
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (modalBackdrop.classList.contains("open")) closeModal();
    else setMenu(false);
  });

  // ================= Confirmation modal =================
  // One reusable dialog: Reset Chat confirm + the pre-leave download prompt.
  function showModal(text, confirmLabel, cancelLabel, onConfirm, onCancel, opts = {}) {
    modalText.textContent = text;
    modalConfirm.textContent = confirmLabel;
    modalCancel.textContent = cancelLabel;
    modalConfirm.onclick = () => { closeModal(); if (onConfirm) onConfirm(); };
    modalCancel.onclick  = () => { closeModal(); if (onCancel) onCancel(); };
    modalClose.onclick   = () => { closeModal(); };

    // Red destructive confirm button (Reset) vs default blue outline.
    modalConfirm.classList.toggle("btn-danger", !!opts.danger);
    modalConfirm.classList.toggle("btn-outline", !opts.danger);

    // Some modals (Reset) don't need an X — Cancel already dismisses.
    modalClose.style.display = opts.hideClose ? "none" : "";

    modalBackdrop.classList.add("open");
    modalConfirm.focus();
  }
  function closeModal() {
    modalBackdrop.classList.remove("open");
  }

  // ================= Chat export / reset =================
  function exportChat() {
    const stamp = new Date();
    const lines = [
      "Chat with Tom's AI Career Assistant",
      "Exported: " + stamp.toLocaleString(),
      "".padEnd(40, "-"),
      "",
    ];
    chatEl.querySelectorAll(".bubble").forEach((b) => {
      const who = b.classList.contains("user") ? "Visitor" : "Assistant";
      lines.push(who + ": " + b.textContent, "");
    });
    const blob = new Blob([lines.join("\n")], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tom-ai-chat-" + stamp.toISOString().slice(0, 19).replace(/[T:]/g, "-") + ".txt";
    a.click();
    URL.revokeObjectURL(a.href);
    hasExported = true;
  }

  function resetChat() {
    chatEl.innerHTML = "";
    history.length = 0;
    hasExported = false;            // fresh conversation, nothing downloaded yet
    chipsEl.style.display = "";     // bring the starter chips back
    inputEl.value = "";
    addBubble("ai", GREETING);
  }

  // ================= Menu item actions (menu auto-closes after each) =====
  document.getElementById("menuResume").addEventListener("click", () => {
    const a = document.createElement("a");
    a.href = RESUME_URL;
    a.download = "";
    a.click();
    setMenu(false);
  });

  document.getElementById("menuLinkedIn").addEventListener("click", () => {
    window.open(LINKEDIN_URL, "_blank", "noopener");
    setMenu(false);
  });

  document.getElementById("menuGitHub").addEventListener("click", () => {
    window.open(GITHUB_URL, "_blank", "noopener");
    setMenu(false);
  });

  document.getElementById("menuExport").addEventListener("click", () => {
    exportChat();
    setMenu(false);
  });

  document.getElementById("menuReset").addEventListener("click", () => {
    showModal(
      "Are you sure? This will erase your chat.",
      "Reset",
      "Cancel",
      () => { resetChat(); setMenu(false); },
      null,
      { danger: true, hideClose: true }
    );
  });

  // ================= Back to LinkedIn: pre-leave download prompt =========
  backLink.addEventListener("click", (e) => {
    const hasUserMessages = !!chatEl.querySelector(".bubble.user");
    if (!hasUserMessages || hasExported) return; // navigate normally

    e.preventDefault();
    showModal(
      "Want to take this chat with you?",
      "Save Chat",
      "Not now",
      () => {
        exportChat();
        setTimeout(() => { window.location.href = LINKEDIN_URL; }, 350);
      },
      () => { window.location.href = LINKEDIN_URL; }
    );
  });
</script>
</body>
</html>
